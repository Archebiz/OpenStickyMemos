# Nixpacks configuration for OpenStickyMemos Backend
# Railway reads this file during build

pkgDir = "src/backend/OpenStickyMemos.Api"

[phases.setup]
nixPkgs = []

[phases.install]
cmd = "curl -sSL https://dot.net/v1/dotnet-install.sh -o /tmp/dotnet-install.sh && chmod +x /tmp/dotnet-install.sh && /tmp/dotnet-install.sh --channel 10.0 --install-dir /usr/share/dotnet && ln -sf /usr/share/dotnet/dotnet /usr/local/bin/dotnet && rm /tmp/dotnet-install.sh"

[phases.build]
cmd = "dotnet restore && dotnet publish -c Release -o out --self-contained false"

[phases.start]
cmd = "./out/OpenStickyMemos.Api"
