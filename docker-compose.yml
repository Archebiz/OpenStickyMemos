version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: openstickymemos-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: openstickymemos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    container_name: openstickymemos-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://0.0.0.0:5000
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=openstickymemos;Username=postgres;Password=postgres"
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ./src/web
      dockerfile: Dockerfile
    container_name: openstickymemos-web
    environment:
      API_URL: http://backend:5000
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  pgdata:
